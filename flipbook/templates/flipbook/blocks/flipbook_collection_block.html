{# Rendered by FlipbookCollectionBlock.get_context() — 'documents' is passed in automatically. #}
<section class="flipbook-collection-block py-4">
    {% if value.heading %}
    <h2 class="mb-3">{{ value.heading }}</h2>
    {% endif %}

    {# DearFlip CDN — injected once per block usage #}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook/dflip/css/dflip.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook/dflip/css/themify-icons.min.css">
    <style>
        /* Disable DearFlip thumbnail hover slide-up and title overlay */
        ._df_book-cover { transition: none !important; }
        ._df_book-cover:hover { transform: none !important; }
        ._df_book-title { display: none !important; }
    </style>

    {% include 'flipbook/_collection_grid.html' %}

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook/dflip/js/dflip.min.js"></script>
</section>
